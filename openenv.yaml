name: LegalLensEnv
version: "1.0.0"
app: server.app:app
description: >
  LegalLens AI — Indian Legal Problem Analyzer.
  An AI agent listens to a common person's legal problem in plain language,
  identifies the violated laws and sections (IPC, Consumer Act, IT Act, POSH, RERA),
  and recommends the correct legal action and forum.

author: OpenEnv Hackathon Submission
tags:
  - openenv
  - legal
  - india
  - law
  - access-to-justice
  - real-world

real_world_task: true
domain: legal / access to justice / civic tech

tasks:
  - id: task_1_easy
    name: "Online Shopping Fraud"
    difficulty: easy
    description: >
      Appellant paid 15000 for a phone via UPI to a fake website.
      Product never arrived. Website now offline. Agent must identify
      IT Act 66D + IPC 420 + Consumer Protection Act.
    max_steps: 12
    baseline_score: 0.78

  - id: task_2_medium
    name: "Workplace Harassment + Salary Issue"
    difficulty: medium
    description: >
      Female employee facing workplace sexual harassment from manager.
      HR ignored complaint. Manager threatened her job.
      Salary withheld for one month.
      Multiple overlapping laws POSH Act + Payment of Wages Act + IPC 506.
    max_steps: 18
    baseline_score: 0.63

  - id: task_3_hard
    name: "Builder Fraud + Counter Legal Notice"
    difficulty: hard
    description: >
      45 lakh flat — 3 years no possession. Hidden clause in agreement.
      Builder sent defamation legal notice when appellant complained.
      Home loan EMI ongoing. Multiple forums RERA + Consumer Forum + Criminal.
    max_steps: 25
    baseline_score: 0.51

observation_space:
  type: structured
  model: Observation (Pydantic)

action_space:
  type: structured
  model: Action (Pydantic)

reward:
  type: continuous
  range: [-0.3, 1.0]
  episode_range: [0.0, 1.0]

disclaimer: >
  LegalLens AI provides informational analysis only.
  Not legal advice. Consult a qualified lawyer.

dependencies:
  python: ">=3.10"
  packages:
    - pydantic>=2.0
    - openai>=1.0
    - fastapi>=0.104
    - uvicorn>=0.24

deployment:
  huggingface_space: true
  docker: true
  port: 7860